# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Karakeep on Render — one-click template
# Repo: https://github.com/render-examples/karakeep-render-template
# Upstream: https://github.com/karakeep-app/karakeep
# Image: https://github.com/karakeep-app/karakeep/pkgs/container/karakeep
#
# Pattern: image-wrapper (official GHCR AIO image) + Meilisearch + headless Chrome.
# Mirrors upstream docker/docker-compose.yml on Render private networking.
#
# LLM keys are NOT required at Apply time. Add OPENAI_API_KEY after deploy for AI tagging.

previews:
  generation: off

envVarGroups:
  - name: karakeep-shared
    envVars:
      - key: MEILI_MASTER_KEY
        generateValue: true

projects:
  - name: karakeep-render-template
    environments:
      - name: production
        services:
          - type: web
            name: karakeep
            runtime: docker
            region: oregon
            dockerfilePath: ./docker/Dockerfile.render-karakeep
            dockerContext: .
            healthCheckPath: /api/health
            disk:
              name: karakeep-data
              mountPath: /data
              sizeGB: 5
            envVars:
              - fromGroup: karakeep-shared
              - key: DATA_DIR
                value: /data
              - key: MEILI_ADDR
                value: http://meilisearch:7700
              - key: BROWSER_WEB_HOST
                fromService:
                  name: chrome
                  type: pserv
                  property: host
              - key: BROWSER_WEB_PORT
                value: "9222"
              - key: DB_WAL_MODE
                value: "true"
              - key: NEXTAUTH_SECRET
                generateValue: true
              - key: NEXTAUTH_URL
                fromService:
                  name: karakeep
                  type: web
                  envVarKey: RENDER_EXTERNAL_URL
              - key: OPENAI_API_KEY
                sync: false

          - type: pserv
            name: meilisearch
            runtime: image
            region: oregon
            image:
              url: getmeili/meilisearch
            disk:
              name: meilisearch-data
              mountPath: /meili_data
              sizeGB: 1
            envVars:
              - fromGroup: karakeep-shared
              - key: MEILI_NO_ANALYTICS
                value: "true"

          - type: pserv
            name: chrome
            runtime: docker
            region: oregon
            dockerfilePath: ./docker/Dockerfile.render-chrome
            dockerContext: .
